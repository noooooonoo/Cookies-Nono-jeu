<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker avec Améliorations</title>
    <style>
        /* Styles CSS */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #333;
            color: #fff;
            margin: 0;
            overflow-x: hidden; /* Empêche le défilement horizontal */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #game-area {
            text-align: center;
            background-color: #555;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            width: 95%; /* S'adapte mieux aux petits écrans */
            max-width: 800px; /* Taille maximale pour les grands écrans */
            box-sizing: border-box; /* Inclut le padding dans la largeur */
            margin-bottom: 20px;
        }

        #cookie-count {
            font-size: 3em;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        #cps-display {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #aaffaa;
        }

        /* --- STYLES ET STRUCTURE DU COOKIE (BOUTON DE CLIC) --- */
        #click-button {
            position: relative; /* Important pour positionner les couches du cookie */
            width: 150px;
            height: 150px;
            border: none; /* Plus de bordure de bouton native */
            background: none; /* Plus de couleur de fond native */
            border-radius: 50%; /* Pour la forme globale du cookie */
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: manipulation;
            margin-bottom: 30px;

            /* Applique l'animation de saut au conteneur du cookie */
            animation: cookieJump 2s infinite alternate ease-in-out;
            transform-origin: center bottom; /* Point de pivot pour le saut */
            transition: transform 0.1s ease-out; /* Pour l'effet de clic */
            outline: none; /* Supprime le contour bleu sur le focus */
        }

        /* Effet au clic */
        #click-button:active {
            transform: scale(0.95);
            animation: none; /* Arrête l'animation de saut pendant le clic */
        }

        /* Animation de saut pour le cookie (le #click-button) */
        @keyframes cookieJump {
            0% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-20px) scale(1.05); /* Monte de 20px, grossit un peu */
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        /* Styles pour le contour extérieur du cookie */
        .cookie-outer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; /* Prend la taille du bouton */
            height: 100%;
            background-color: #8B4513; /* Couleur marron foncé */
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4); /* Ombre pour donner du relief */
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); /* Petit halo lumineux */
        }

        /* Styles pour l'intérieur du cookie (beige clair) */
        .cookie-inner {
            position: absolute;
            top: 10px; /* Décalage pour créer le contour */
            left: 10px;
            width: calc(100% - 20px); /* 150px - 2*10px = 130px de diamètre */
            height: calc(100% - 20px);
            background-color: #F5DEB3; /* Couleur beige clair pour l'intérieur du cookie */
            border-radius: 50%;
            /* Ajout de overflow: hidden pour s'assurer que les pépites ne dépassent pas */
            overflow: hidden; 
        }

        /* Styles pour les pépites de chocolat */
        .chip {
            position: absolute;
            background-color: #654321; /* Couleur marron foncé pour les pépites */
            border-radius: 50%;
            z-index: 2; /* S'assure que les pépites sont au-dessus de l'intérieur */
            box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4); /* Petite ombre pour le relief */
        }

        /* Positionnement et tailles des pépites sur le cookie (plus harmonieux et à l'intérieur) */
        /* Les valeurs 'top', 'left', 'right', 'bottom' sont relatives au .cookie-inner (130x130px) */
        .chip-1 { top: 15px; left: 20px; width: 22px; height: 22px; }
        .chip-2 { top: 5px; right: 15px; width: 28px; height: 28px; }
        .chip-3 { bottom: 25px; left: 10px; width: 20px; height: 20px; }
        .chip-4 { bottom: 15px; right: 20px; width: 26px; height: 26px; }
        .chip-5 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; }
        .chip-6 { top: 20px; left: 60%; width: 24px; height: 24px; }
        .chip-7 { bottom: 10px; left: 45%; width: 22px; height: 22px; }
        .chip-8 { top: 40px; left: 5px; width: 25px; height: 25px; }
        .chip-9 { bottom: 5px; right: 5px; width: 18px; height: 18px; }
        .chip-10 { top: 5px; left: 5px; width: 15px; height: 15px; }
        .chip-11 { bottom: 35px; right: 5px; width: 16px; height: 16px; }
        .chip-12 { top: 55px; right: 10px; width: 20px; height: 20px; }
        /* --- FIN DES STYLES ET STRUCTURE DU COOKIE --- */


        h2 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #fff;
        }

        #upgrades-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .upgrade-button {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease-out, box-shadow 0.1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            user-select: none;
            touch-action: manipulation;
        }

        .upgrade-button h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
            color: #ffdd88;
        }

        .upgrade-button p {
            margin: 0;
            font-size: 0.85em;
            color: #ddd;
        }

        .upgrade-button .cost {
            font-weight: bold;
            color: #ffe066;
            margin-top: 8px;
            font-size: 1em;
        }

        /* Style pour le compteur d'améliorations */
        .upgrade-button .count {
            font-size: 0.9em;
            color: #bbffbb;
            margin-top: 5px;
        }

        .upgrade-button:hover {
            background-color: #45a049;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .upgrade-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .upgrade-button.disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            opacity: 0.7;
            box-shadow: none;
        }

        .upgrade-button.disabled:hover {
            background-color: #6c757d;
        }

        /* Styles pour les cookies qui tombent (utilisés pour les achats d'améliorations) */
        .falling-cookie {
            position: fixed;
            width: 25px;
            height: 25px;
            background-color: #F5DEB3; /* Utilise la couleur du cookie, sans image */
            border-radius: 50%;
            pointer-events: none; /* Permet de cliquer à travers */
            opacity: 1;
            animation: fallAndFade 1.5s forwards ease-out;
            z-index: 9999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); /* Petite ombre pour la profondeur */
        }

        @keyframes fallAndFade {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(200px) rotate(720deg) scale(0.5); /* Réduit la taille en tombant */
                opacity: 0;
            }
        }

        /* Styles pour les cookies dorés */
        .golden-cookie {
            position: fixed;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd700, #ffaa00);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            animation: goldenPulse 1s infinite, goldenFloat 3s ease-in-out infinite;
            border: 3px solid #ffed4e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            transition: transform 0.2s;
        }

        .golden-cookie:hover {
            transform: scale(1.1);
        }

        .golden-cookie:active {
            transform: scale(0.95);
        }

        @keyframes goldenPulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 1), 0 0 70px rgba(255, 215, 0, 0.7);
            }
        }

        @keyframes goldenFloat {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-10px) rotate(5deg);
            }
            75% {
                transform: translateY(-5px) rotate(-5deg);
            }
        }

        /* Bannière d'événement */
        #event-banner {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 9998;
            display: none;
            animation: bannerSlide 0.5s ease-out;
        }

        @keyframes bannerSlide {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 10px;
                opacity: 1;
            }
        }

        /* Thèmes d'événements */
        body.halloween-theme {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
        }

        body.christmas-theme {
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
        }

        body.newyear-theme {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f1d2f 100%);
        }

        body.valentine-theme {
            background: linear-gradient(135deg, #5e1a3c 0%, #2f0d1e 100%);
        }

        /* Message de bonus */
        .bonus-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.95);
            color: #333;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 2em;
            font-weight: bold;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            z-index: 10001;
            animation: bonusAppear 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes bonusAppear {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

        const eventBanner = document.getElementById('event-banner');

        const events = {
            halloween: {
                name: '🎃 Halloween',

        // Vérifier si on est dans une période d'événement
        function checkCurrentEvent() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentDay = now.getDate();

            for (const eventKey in events) {
                const event = events[eventKey];
                
                // Gestion des événements qui traversent deux mois
                let inEventPeriod = false;
                
                if (event.startMonth === event.endMonth) {
                    // Même mois
                    inEventPeriod = currentMonth === event.startMonth && 
                                   currentDay >= event.startDay && 
                                   currentDay <= event.endDay;
                } else if (event.startMonth > event.endMonth) {
                    // Traverse l'année (ex: Nouvel An)
                    inEventPeriod = (currentMonth === event.startMonth && currentDay >= event.startDay) ||
                                   (currentMonth === event.endMonth && currentDay <= event.endDay);
                } else {
                    // Traverse un mois normal
                    inEventPeriod = (currentMonth === event.startMonth && currentDay >= event.startDay) ||
                                   (currentMonth === event.endMonth && currentDay <= event.endDay) ||
                                   (currentMonth > event.startMonth && currentMonth < event.endMonth);
                }

                if (inEventPeriod) {
                    if (currentEvent !== event) {
                        activateEvent(event);
                    }
                    return;
                }
            }

            // Aucun événement actif
            if (currentEvent) {
                deactivateEvent();
            }
        }

        function activateEvent(event) {
            currentEvent = event;
            document.body.className = event.theme;
            if (eventBanner) {
                eventBanner.textContent = event.message;
                eventBanner.style.display = 'block';
            }
        }

        function deactivateEvent() {
            currentEvent = null;
            document.body.className = '';
            if (eventBanner) {
                eventBanner.style.display = 'none';
            }
        }

        // Créer un cookie doré
        function spawnGoldenCookie() {
            const goldenCookie = document.createElement('div');
            goldenCookie.classList.add('golden-cookie');
            goldenCookie.textContent = '🍪';

            // Position aléatoire sur l'écran (évite les bords)
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            const randomX = Math.random() * maxX + 10;
            const randomY = Math.random() * maxY + 10;

            goldenCookie.style.left = `${randomX}px`;
            goldenCookie.style.top = `${randomY}px`;

            // Durée de vie du cookie doré
            const lifetime = 13000; // 13 secondes

            document.body.appendChild(goldenCookie);

            // Clic sur le cookie doré
            goldenCookie.addEventListener('click', () => {
                clickGoldenCookie();
                goldenCookie.remove();
            });

            // Le cookie disparaît après un certain temps
            setTimeout(() => {
                if (document.body.contains(goldenCookie)) {
                    goldenCookie.remove();
                }
            }, lifetime);
        }

        // Effets du cookie doré
        function clickGoldenCookie() {
            const bonusType = Math.random() < 0.5 ? 'instant' : 'multiplier';
            
            if (bonusType === 'instant') {
                // Bonus instantané : 10% de la production d'1 minute
                const bonus = Math.floor(cookiesPerSecond * 60 * 0.1) + clickPower * 100;
                cookies += bonus;
                showBonusMessage(`+${bonus.toLocaleString('fr-FR')} Cookies !`);
            } else {
                // Multiplicateur x2 pendant 30 secondes
                goldenCookieBonus = 2;
                showBonusMessage('Production x2 pendant 30s !');
                
                setTimeout(() => {
                    goldenCookieBonus = 1;
                    showBonusMessage('Bonus terminé !');
                }, 30000);
            }

            updateDisplay();
        }

        // Afficher le message de bonus
        function showBonusMessage(message) {
            const bonusMsg = document.createElement('div');
            bonusMsg.classList.add('bonus-message');
            bonusMsg.textContent = message;
            document.body.appendChild(bonusMsg);

            setTimeout(() => {
                bonusMsg.remove();
            }, 2000);
        }

        // Apparition aléatoire des cookies dorés
        function scheduleNextGoldenCookie() {
            // Apparition entre 1 et 3 minutes
            const delay = (60 + Math.random() * 120) * 1000;
            setTimeout(() => {
                spawnGoldenCookie();
                scheduleNextGoldenCookie();
            }, delay);
        }

        // --- Fonctions de mise à jour de l'interface ---
        function updateDisplay() {
            if (cookieCountDisplay) {
                // Utilise toLocaleString pour formater les grands nombres avec des espaces pour la lisibilité
                cookieCountDisplay.textContent = `${Math.floor(cookies).toLocaleString('fr-FR')} Cookies`;
            }
            if (cpsDisplay) {
                cpsDisplay.textContent = `${cookiesPerSecond.toLocaleString('fr-FR')} Cookies/seconde`;
            }
            checkUpgradeButtons();
            checkEraserButton();
            updateUpgradeCounts(); // Appel de la nouvelle fonction pour mettre à jour les compteurs
        }

        function updateUpgradeCounts() {
            for (const key in upgrades) {
                const upgrade = upgrades[key];
                if (upgrade.countDisplay) {
                    upgrade.countDisplay.textContent = `Possédé: ${upgrade.count.toLocaleString('fr-FR')}`;
                }
            }
        }

        function checkUpgradeButtons() {
            for (const key in upgrades) {
                const upgrade = upgrades[key];
                if (upgrade.element) {
                    upgrade.element.classList.toggle('disabled', cookies < upgrade.cost);
                }
            }
        }

        function checkEraserButton() {
            if (eraserButton) {
                eraserButton.classList.toggle('disabled', purchaseHistory.length === 0);
            }
        }

        // --- Logique de sauvegarde et chargement ---
        function saveGame() {
            const gameData = {
                cookies: cookies,
                clickPower: clickPower,
                cookiesPerSecond: cookiesPerSecond,
                upgrades: {},
                purchaseHistory: purchaseHistory
            };
            for (const key in upgrades) {
                gameData.upgrades[key] = {
                    cost: upgrades[key].cost,
                    count: upgrades[key].count
                };
            }
            localStorage.setItem('cookieClickerGameData', JSON.stringify(gameData));
        }

        function loadGame() {
            const savedData = localStorage.getItem('cookieClickerGameData');
            if (savedData) {
                const gameData = JSON.parse(savedData);
                cookies = gameData.cookies || 0;
                clickPower = gameData.clickPower || 1;
                cookiesPerSecond = gameData.cookiesPerSecond || 0;
                purchaseHistory = gameData.purchaseHistory || [];

                for (const key in gameData.upgrades) {
                    if (upgrades[key]) {
                        upgrades[key].cost = gameData.upgrades[key].cost || upgrades[key].baseCost;
                        upgrades[key].count = gameData.upgrades[key].count || 0;
                        // Appliquer les bonus CPS/Click après le chargement des comptes d'amélioration
                        if (upgrades[key].increase.cps && upgrades[key].count > 0) {
                            // On retire d'abord le bonus actuel pour éviter de le doubler si on a juste chargé
                            // puis on l'ajoute de nouveau en fonction du 'count' chargé.
                            // C'est plus robuste si le jeu était déjà en cours avant le rechargement.
                            cookiesPerSecond += upgrades[key].increase.cps * upgrades[key].count;
                        }
                        if (upgrades[key].increase.click && upgrades[key].count > 0) {
                            clickPower += upgrades[key].increase.click * upgrades[key].count;
                        }
                    }
                }
            }
            // Mettre à jour l'affichage des coûts et des compteurs après le chargement
            for (const key in upgrades) {
                if (upgrades[key].costDisplay) {
                    upgrades[key].costDisplay.textContent = `Coût: ${upgrades[key].cost.toLocaleString('fr-FR')} Cookies`;
                }
                if (upgrades[key].countDisplay) {
                    upgrades[key].countDisplay.textContent = `Possédé: ${upgrades[key].count.toLocaleString('fr-FR')}`;
                }
            }
            updateDisplay();
        }

        // --- Effets visuels (cookies qui tombent) ---
        function dropCookiesFromElement(element, count = 8) {
            if (!element) {
                return;
            }
            const rect = element.getBoundingClientRect();

            for (let i = 0; i < count; i++) {
                const fallingCookie = document.createElement('div');
                fallingCookie.classList.add('falling-cookie');

                // Position fixe par rapport à la fenêtre (fonctionne en plein écran)
                const startX = rect.left + rect.width / 2 - 12.5; // Centre horizontal - 12.5px (moitié de 25px)
                const startY = rect.top + rect.height / 2 - 12.5; // Centre vertical - 12.5px

                // Petite dispersion seulement horizontale pour qu'ils partent du cookie
                const disperseX = Math.random() * 60 - 30; // Dispersion de -30px à +30px
                
                fallingCookie.style.left = `${startX + disperseX}px`;
                fallingCookie.style.top = `${startY}px`;

                fallingCookie.style.animationDelay = `${Math.random() * 0.2}s`;
                fallingCookie.style.animationDuration = `${0.8 + Math.random() * 0.5}s`; // Entre 0.8s et 1.3s

                document.body.appendChild(fallingCookie);

                fallingCookie.addEventListener('animationend', () => {
                    fallingCookie.remove();
                });
            }
        }

        // --- Logique d'achat d'amélioration ---
        function buyUpgrade(upgradeKey) {
            const upgrade = upgrades[upgradeKey];

            if (!upgrade || !upgrade.element || upgrade.element.classList.contains('disabled')) {
                return false;
            }

            if (cookies >= upgrade.cost) {
                cookies -= upgrade.cost;
                purchaseHistory.push(upgradeKey);

                if (upgrade.increase.cps) {
                    cookiesPerSecond += upgrade.increase.cps;
                }
                if (upgrade.increase.click) {
                    clickPower += upgrade.increase.click;
                }
                upgrade.count++;

                upgrade.cost = Math.floor(upgrade.cost * 1.5);
                if (upgrade.costDisplay) {
                    upgrade.costDisplay.textContent = `Coût: ${upgrade.cost.toLocaleString('fr-FR')} Cookies`;
                }
                if (upgrade.countDisplay) { // Mettre à jour le compteur après l'achat
                    upgrade.countDisplay.textContent = `Possédé: ${upgrade.count.toLocaleString('fr-FR')}`;
                }

                updateDisplay();
                dropCookiesFromElement(upgrade.element, 8);
                return true;
            }
            return false;
        }

        // --- Logique d'annulation (gomme) ---
        function sellLastUpgrade() {
            if (purchaseHistory.length === 0) {
                return false;
            }

            const lastUpgradeKey = purchaseHistory.pop();
            const upgrade = upgrades[lastUpgradeKey];

            if (!upgrade || upgrade.count <= 0) { // Ne devrait pas arriver si purchaseHistory est géré correctement
                updateDisplay();
                return false;
            }

            const refundAmount = Math.floor(upgrade.cost / 1.5 * 0.75); // 75% du coût précédent
            cookies += refundAmount;

            if (upgrade.increase.cps) {
                cookiesPerSecond -= upgrade.increase.cps;
            }
            if (upgrade.increase.click) {
                clickPower -= upgrade.increase.click;
            }
            upgrade.count--;

            // Si c'est la dernière amélioration de ce type, réinitialise son coût à son coût de base
            if (upgrade.count === 0) {
                upgrade.cost = upgrade.baseCost;
            } else {
                // Sinon, reviens au coût précédent
                upgrade.cost = Math.floor(upgrade.cost / 1.5); 
            }

            if (upgrade.costDisplay) {
                upgrade.costDisplay.textContent = `Coût: ${upgrade.cost.toLocaleString('fr-FR')} Cookies`;
            }
            if (upgrade.countDisplay) { // Mettre à jour le compteur après la vente
                upgrade.countDisplay.textContent = `Possédé: ${upgrade.count.toLocaleString('fr-FR')}`;
            }

            updateDisplay();
            return true;
        }


        // --- Gestionnaires d'événements ---
        if (clickButton) {
            clickButton.addEventListener('click', () => {
                cookies += clickPower;
                updateDisplay();
                // Gère la reprise de l'animation après le clic
                clickButton.style.animation = 'none'; // Arrête l'animation pendant le clic
                // Force un "reflow" pour réinitialiser l'animation
                void clickButton.offsetWidth; 
                clickButton.style.animation = 'cookieJump 2s infinite alternate ease-in-out'; // Relance l'animation
                
                // Ajoute l'animation de cookies qui tombent lors du clic
                dropCookiesFromElement(clickButton, 12);
            });
        }

        const allButtons = document.querySelectorAll('.upgrade-button, #eraser-button');

        allButtons.forEach(button => {
            button.addEventListener('click', () => {
                const upgradeKey = button.id;
                if (button.classList.contains('upgrade-button')) {
                    // Supprime le suffixe '-upgrade' pour obtenir la clé de l'objet 'upgrades'
                    buyUpgrade(upgradeKey.replace('-upgrade', '')); 
                } else if (upgradeKey === 'eraser-button') {
                    sellLastUpgrade();
                }
            });
        });

        // --- Boucles de jeu ---
        setInterval(() => {
            cookies += (cookiesPerSecond / 60) * goldenCookieBonus; // Applique le multiplicateur du cookie doré
            updateDisplay();
        }, 1000 / 60); // 60 fois par seconde (environ 16.67ms)

        setInterval(saveGame, 5000); // Sauvegarde toutes les 5 secondes

        // Vérifier les événements toutes les minutes
        setInterval(checkCurrentEvent, 60000);

        document.addEventListener('DOMContentLoaded', loadGame); // Charge la partie au démarrage

        // Initialisation
        updateDisplay(); // Mise à jour initiale de l'affichage
        checkCurrentEvent(); // Vérifie l'événement actuel
        scheduleNextGoldenCookie(); // Lance le système de cookies dorés
    </script>
</body>
</html>
